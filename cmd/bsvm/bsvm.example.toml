datadir = "./data"
genesis = ""
log_level = "info"
log_format = "text"

[shard]
chain_id = 8453111
genesis_covenant_txid = ""
genesis_covenant_vout = 0
covenant_sats = 10000

[overlay]
coinbase = "0x0000000000000000000000000000000000000000"
block_gas_limit = 30000000
batch_size = 128
max_batch_flush_delay = "2s"
min_gas_price = "1000000000"
max_speculative_depth = 16

[rpc]
http_addr = "0.0.0.0:8545"
ws_addr = "0.0.0.0:8546"
cors_origins = ["*"]

[prover]
mode = "mock"
workers = 1

[network]
listen_addr = "/ip4/0.0.0.0/tcp/9945"
bootstrap_peers = []
max_peers = 50

[bsv]
# Legacy single-endpoint BSV-node JSON-RPC URL. Retained for backward
# compat. Prefer node_urls below for testnet/mainnet failover (W6-11).
node_url = ""
# W6-11 BSV-node failover. List one or more endpoints in preference
# order; index 0 is the primary, index 1+ are backups consulted on
# transport / 5xx errors. Empty list falls back to node_url. When
# both are set, node_urls wins. Application-level RPC errors are NOT
# retried (a deterministic answer would not change between nodes).
node_urls = []
# Park a node after this many consecutive transport / 5xx failures.
node_max_consecutive_failures = 3
# Cooldown duration before a parked node is retried.
node_cooldown = "30s"
# Legacy single-endpoint ARC URL. Prefer [[bsv.arc_endpoint]] for
# multi-endpoint fan-out (W6-3). When both are set, arc_endpoint wins.
arc_url = ""
# Fan-out strategy: "first_success" (default) or "quorum".
arc_strategy = "first_success"
# Required when arc_strategy = "quorum".
arc_quorum = 0
arc_default_timeout = "30s"
arc_callback_url = ""
arc_callback_token = ""
network = "mainnet"
fee_wallet_key = ""
confirmations = 6
# In-process LRU bound for cached WhatsOnChain GetTx lookups (W6-8).
# WoC enforces per-IP rate limits; caching content-addressed lookups
# keeps the budget free for fresh queries. Set to 0 to disable.
woc_cache_size = 1000

# Multi-endpoint ARC fan-out (W6-3). Add one block per ARC provider.
# [[bsv.arc_endpoint]]
# name = "taal"
# url = "https://arc.taal.com"
# auth_token = ""
# timeout = "30s"
# max_retries = 1
# retry_backoff = "100ms"

# BRC-104 mutual-auth for inbound ARC callbacks (W6-10).
# When enabled with at least one identity, callbacks must carry
# valid BRC-104 headers. Set allow_token = true during migration to
# also accept the legacy X-CallbackToken header.
[bsv.arc_brc104]
enabled = false
timestamp_window = "60s"
nonce_cache_size = 8192
allow_token = true
# [[bsv.arc_brc104.identity]]
# name = "arc-prod"
# public_key_hex = "02..."  # 33-byte compressed or 65-byte uncompressed

# Chaintracks header oracle. Default ships ONE provider so quorum stays
# opt-in. To enable W6-2 multi-upstream cross-checking, add additional
# [[bsv.chaintracks.providers]] blocks and bump quorum_m to >=2.
# See docs/decisions/header-oracle-quorum.md for the full design.
[bsv.chaintracks]
quorum_strategy = "hybrid"          # "hybrid" or "m_of_n"
quorum_m = 1                         # mainnet shards should set >=2
disagreement_action = "log"          # "log", "drop", or "halt"
disagreement_cooldown = "10m"
response_timeout = "5s"
stream_skew_window = "750ms"
stream_buffer_max = 32

[[bsv.chaintracks.providers]]
name = "bhs-primary"
url  = "https://headers.example.com/api/v1/chain"
api_key = ""
weight = 1
timeout = "5s"
enabled = true

# Example secondary provider (commented out by default — opt in to
# enable quorum and bump quorum_m above to 2):
# [[bsv.chaintracks.providers]]
# name = "bhs-secondary"
# url  = "https://headers.other.example/headers"
# api_key = ""
# weight = 1
# timeout = "5s"
# enabled = true

[bridge]
min_deposit_satoshis = 10000
min_withdrawal_satoshis = 10000
bsv_confirmations = 6

[database]
engine = "leveldb"
cache_mb = 256

[governance]
mode = "none"
keys = []
threshold = 0

[beef]
# Spec-17 BEEF gossip + ARC callback endpoints under /bsvm/* on the
# JSON-RPC HTTP listener. Keep enabled on any node that participates
# in the BEEF gossip topic (effectively every shard node).
enabled = true
# Bridge-deposit security default. Leave false until W6-4 ships full
# BRC-62 ancestry + script re-exec verification — the route always
# stores the envelope, but only credits the deposit on L2 when the
# verification gate passes. Devnet operators can flip this to true to
# pre-flight the wiring without ancestry verification.
accept_unverified_bridge_deposits = false

# -----------------------------------------------------------------------------
# Worked example: BSV-node failover (W6-11)
# -----------------------------------------------------------------------------
# A testnet operator with two self-hosted BSV nodes plus a public fallback
# would set the [bsv] block roughly as follows:
#
# [bsv]
# # Leave node_url empty (or set it to the primary, it is ignored when
# # node_urls is non-empty).
# node_url = ""
# node_urls = [
#   "http://rpc-user:rpc-pass@bsv-primary.internal:8332/",
#   "http://rpc-user:rpc-pass@bsv-secondary.internal:8332/",
#   "http://rpc-user:rpc-pass@bsv-public.example.com:8332/",
# ]
# node_max_consecutive_failures = 3
# node_cooldown = "60s"
# network = "testnet"
#
# Index 0 is hit on every call; index 1 only on connection error or 5xx
# from index 0; index 2 only when both prior fail. After 3 consecutive
# failures a node is parked for 60s, after which it is retried.
# Application-level RPC errors (tx not found, mempool conflict, etc.)
# are surfaced immediately and never trigger failover — the next node
# would return the same answer.
