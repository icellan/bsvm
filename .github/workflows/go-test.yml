name: Go test

# PR-gate Go test workflow — every package without a build tag (so
# excludes integration/multinode/devnet which need a live BSV regtest
# node or docker compose, and which run in other workflows).
#
# Four parallel jobs: lint, build, test, evmtest. The slower / flakier
# checks (race + fuzz) live in `.github/workflows/go-extra.yml` on a
# nightly + workflow_dispatch trigger so a transient runner-pool reap
# doesn't block PR merges.
#
# All `run:` blocks operate on local repo files — no untrusted GitHub
# event payloads are interpolated. Safe under the GitHub Actions
# command-injection guidance.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: go-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: gofmt + go vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar (sibling — go.mod replace targets ../runar)
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: gofmt -l (must produce empty output)
        working-directory: bsv-evm
        run: |
          out=$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))
          if [ -n "$out" ]; then
            echo "gofmt errors in:"
            echo "$out"
            exit 1
          fi

      - name: go vet ./...
        working-directory: bsv-evm
        run: go vet ./...

  build:
    name: go build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go build ./...
        working-directory: bsv-evm
        run: go build ./...

  test:
    name: go test (no tags)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test (excludes evmtest + covenant — run in dedicated jobs)
        working-directory: bsv-evm
        # -count=1 disables the test cache so flaky regressions don't
        # hide behind a stale "ok (cached)". -p 2 limits package-level
        # parallelism so the runner doesn't OOM-reap.
        # Excludes:
        #   - test/evmtest (long, dedicated job).
        #   - pkg/covenant (8+ min on free runners, dedicated job —
        #     previous runs got reaped at 5 min of stdout silence while
        #     advance_invariants_test compiled all three rollup modes).
        run: |
          go test -count=1 -p 2 -timeout 15m \
            $(go list ./... | grep -vE '/test/evmtest|/pkg/covenant(/|$)')

  covenant:
    name: pkg/covenant (dedicated — long compile)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test ./pkg/covenant/...
        working-directory: bsv-evm
        # -v streams each test as it runs so the runner's idle-stdout
        # detector doesn't reap the job during the long compile of
        # the three rollup contracts. -p 1 forces sequential package
        # execution to keep memory bounded.
        run: go test -count=1 -p 1 -v -timeout 20m ./pkg/covenant/...

  evmtest:
    name: ethereum/tests (test/evmtest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test ./test/evmtest/...
        working-directory: bsv-evm
        run: go test -count=1 -p 2 -timeout 12m ./test/evmtest/...

