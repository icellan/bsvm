name: Go test

# PR-gate Go test workflow.
#
# Five parallel fast jobs (lint, build, test, covenant, evmtest), then
# a sequential devnet-smoke job gated by `needs:` so the docker image
# build + compose cluster only run when the unit tests are green.
# Saves ~5 min of runner time on red PRs and gives a single overall
# status check.
#
# Slower / flakier checks (race + fuzz) live in
# `.github/workflows/go-extra.yml` on a nightly + workflow_dispatch
# trigger so a transient runner-pool reap doesn't block PR merges.
#
# All `run:` blocks operate on local repo files — no untrusted GitHub
# event payloads are interpolated. Safe under the GitHub Actions
# command-injection guidance.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: go-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: gofmt + go vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar (sibling — go.mod replace targets ../runar)
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: gofmt -l (must produce empty output)
        working-directory: bsv-evm
        run: |
          out=$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))
          if [ -n "$out" ]; then
            echo "gofmt errors in:"
            echo "$out"
            exit 1
          fi

      - name: go vet ./...
        working-directory: bsv-evm
        run: go vet ./...

  build:
    name: go build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go build ./...
        working-directory: bsv-evm
        run: go build ./...

  test:
    name: go test (no tags)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test (excludes evmtest + covenant — run in dedicated jobs)
        working-directory: bsv-evm
        # -count=1 disables the test cache so flaky regressions don't
        # hide behind a stale "ok (cached)". -p 2 limits package-level
        # parallelism so the runner doesn't OOM-reap.
        # Excludes:
        #   - test/evmtest (long, dedicated job).
        #   - pkg/covenant (8+ min on free runners, dedicated job —
        #     previous runs got reaped at 5 min of stdout silence while
        #     advance_invariants_test compiled all three rollup modes).
        run: |
          go test -count=1 -p 2 -timeout 15m \
            $(go list ./... | grep -vE '/test/evmtest|/pkg/covenant(/|$)')

  covenant:
    name: pkg/covenant (dedicated — long compile)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test ./pkg/covenant/...
        working-directory: bsv-evm
        # -v streams each test as it runs so the runner's idle-stdout
        # detector doesn't reap the job during the long compile of
        # the three rollup contracts. -p 1 forces sequential package
        # execution to keep memory bounded.
        run: go test -count=1 -p 1 -v -timeout 20m ./pkg/covenant/...

  evmtest:
    name: ethereum/tests (test/evmtest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test ./test/evmtest/...
        working-directory: bsv-evm
        run: go test -count=1 -p 2 -timeout 12m ./test/evmtest/...

  cross-evm-diff-smoke:
    name: cross-EVM diff (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout ethereum/tests into test/evmtest/testdata
        uses: actions/checkout@v4
        with:
          repository: ethereum/tests
          path: bsv-evm/test/evmtest/testdata
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: go test ./test/cross_evm_diff/ (smoke only)
        working-directory: bsv-evm
        # Smoke subset: 5 fixtures covering transfer, sstore, sload,
        # balance, sha3. Full suite (~2.6k fixtures) runs on the daily
        # cron in cross-evm-diff.yml.
        run: go test -count=1 -timeout 2m -run 'TestCrossEVMDiff_Smoke|TestSmokeFixturesExist|TestExecuteStateTestRoot' ./test/cross_evm_diff/

  devnet-smoke:
    name: devnet smoke (mock)
    runs-on: ubuntu-latest
    # Sequential: only run after every Go check passes, so a red
    # PR doesn't burn ~5 min of runner time on the docker image
    # build + compose cluster spin-up.
    needs: [lint, build, test, covenant, evmtest, cross-evm-diff-smoke]
    timeout-minutes: 20

    env:
      # Always mock for the automated suite. `execute` and `prove`
      # require either long CPU time or a GPU and are out of scope
      # for PR-gate CI.
      BSVM_PROVE_MODE: mock

    steps:
      - name: Checkout bsv-evm
        uses: actions/checkout@v4
        with:
          path: bsv-evm

      - name: Checkout runar (sibling of bsv-evm for go.mod replace directives)
        uses: actions/checkout@v4
        with:
          repository: icellan/runar
          path: runar
          # In private-repo setups the workflow caller needs a PAT with
          # contents:read for the runar repo. When unset, Actions falls
          # back to GITHUB_TOKEN, which works for same-org monorepos.
          token: ${{ secrets.RUNAR_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: bsv-evm/go.sum

      - name: Set up Node (for SPA build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: bsv-evm/web/package-lock.json

      - name: Build React SPA
        working-directory: bsv-evm/web
        run: |
          npm ci
          npm run build

      - name: Build bsvm:devnet image
        env:
          # SPA was built in the previous step; don't rebuild inside
          # docker-build.sh.
          SKIP_WEB_BUILD: "1"
        run: bash bsv-evm/scripts/docker-build.sh

      - name: Pre-pull BSV regtest image
        run: docker pull bitcoinsv/bitcoin-sv:latest

      - name: Run devnet smoke tests
        working-directory: bsv-evm
        run: go test -tags devnet_smoke -v -timeout 5m ./test/devnet/...

      - name: Bring devnet back up for simulator smoke
        working-directory: bsv-evm
        # The smoke test above tears the cluster down via t.Cleanup. The
        # simulator smoke test drives bsvm-sim from the runner host and
        # expects ports 8545/8546/8547 mapped to live containers, so we
        # explicitly restart compose here. All `run:` content is
        # workflow-author-controlled — no untrusted GitHub event payloads
        # are interpolated.
        run: |
          docker compose up -d
          # Wait until 4 containers report healthy (bsv-regtest is the
          # slow one — auto-miner kicks regtest at ~30s post-start).
          deadline=$((SECONDS + 90))
          while [ $SECONDS -lt $deadline ]; do
            healthy=$(docker ps \
              --filter label=com.docker.compose.project=bsv-evm \
              --filter health=healthy \
              --format '{{.Names}}' | wc -l)
            if [ "$healthy" -ge 4 ]; then
              echo "cluster healthy ($healthy containers)"
              exit 0
            fi
            sleep 2
          done
          echo "cluster did not become healthy in 90s"
          docker compose ps
          exit 1

      - name: Run simulator smoke test
        working-directory: bsv-evm
        # Drives real traffic against the compose devnet using bsvm-sim
        # in headless mode. Requires the smoke image to have a loosened
        # MaxSpeculativeDepth (set via compose env) so the 512-block
        # buffer doesn't saturate during the 45s window.
        run: go test -tags devnet_sim -v -timeout 4m ./test/devnet/...

      - name: Capture container logs on failure
        if: failure()
        working-directory: bsv-evm
        run: |
          docker compose ps || true
          for svc in bsv-regtest bsv-miner node1 node2 node3; do
            echo "==== $svc ===="
            docker logs "bsvm-$svc" 2>&1 | tail -200 || true
          done

      - name: Tear down
        if: always()
        working-directory: bsv-evm
        run: docker compose down -v || true

